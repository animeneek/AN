<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Anime</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: { colors: { primary: '#1e293b' } }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="watch.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-5xl mx-auto p-4 space-y-6">
    <h1 id="animeTitle" class="text-2xl font-semibold text-center">Loading...</h1>

    <div class="aspect-video rounded overflow-hidden shadow">
      <iframe id="videoPlayer" class="w-full h-full hidden" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="sourceButtons" class="flex flex-wrap gap-3 justify-center hidden"></div>

    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <select id="episodeSelect" class="w-full sm:w-auto px-4 py-2 rounded bg-gray-100 dark:bg-gray-800 text-black dark:text-white">
        <option value="">Select Episode</option>
      </select>
      <button id="playButton" disabled class="px-4 py-2 rounded bg-blue-500 text-white font-semibold disabled:opacity-50">
        Play
      </button>
    </div>
  </main>
</body>
</html>

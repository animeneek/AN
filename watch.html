<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Episode - AnimeNeek</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: { colors: { primary: '#1e293b' } }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="watch.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-7xl mx-auto p-4">
    <h1 id="animeTitle" class="text-2xl font-semibold mb-4">Watch Episode</h1>

    <div class="flex flex-col md:flex-row gap-4">
      <!-- Left: Video Player & Controls -->
      <div class="flex-1">
        <div class="aspect-video rounded overflow-hidden shadow mb-4">
          <iframe id="videoPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
        </div>

        <!-- Source Buttons -->
        <div id="sourceButtons" class="flex flex-wrap gap-2 mb-4"></div>

        <!-- Episode Dropdown -->
        <div class="flex items-center gap-2 mb-4">
          <select id="episodeDropdown" class="px-4 py-2 rounded bg-gray-800 text-white"></select>
          <button id="playButton" class="px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded">Play</button>
        </div>
      </div>

      <!-- Right: Episode List -->
      <div class="w-full md:w-64">
        <h2 class="text-lg font-semibold mb-2">Episodes</h2>
        <div id="episodeList" class="max-h-[600px] overflow-y-auto border rounded p-2 space-y-1 bg-gray-800 text-white"></div>
      </div>
    </div>
  </main>
</body>
</html>

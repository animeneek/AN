<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Episode - AnimeNeek</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: { colors: { primary: '#1e293b' } }
      }
    };
  </script>
  <script defer src="app.js"></script>
  <script defer src="watch.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-5xl mx-auto p-4 space-y-4">
    <h1 id="animeTitle" class="text-2xl font-semibold">Watch Episode</h1>

    <div id="posterOverlay" class="relative rounded overflow-hidden shadow mb-4 aspect-video bg-cover bg-center">
      <div class="absolute inset-0 bg-black/60 backdrop-blur flex items-center justify-center text-center px-4">
        <p class="text-white text-lg font-medium">Select an episode below and enjoy watching!</p>
      </div>
      <img id="posterImage" class="w-full h-full object-cover opacity-0" alt="Poster" />
    </div>

    <div class="aspect-video rounded overflow-hidden shadow mb-2">
      <iframe id="videoPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="sourceButtons" class="flex flex-wrap gap-2 mb-4"></div>

    <div class="flex items-center gap-2">
      <select id="episodeDropdown" class="px-4 py-2 rounded text-black dark:text-white dark:bg-gray-700 bg-white">
        <option value="">Select Episode</option>
      </select>
      <button id="playButton" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">Play</button>
    </div>
  </main>
</body>
</html>

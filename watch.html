<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Episode - AnimeNeek</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: { colors: { primary: '#1e293b' } }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css" />
  <script defer src="watch.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-5xl mx-auto p-4">
    <h1 id="animeTitle" class="text-2xl font-semibold mb-4">Watch Episode</h1>

    <div class="aspect-video rounded overflow-hidden shadow mb-4 relative" id="videoContainer">
      <img id="posterImage" src="" alt="Anime Poster" class="w-full h-full object-cover filter blur-sm absolute top-0 left-0">
      <div class="absolute inset-0 flex items-center justify-center bg-black bg-opacity-50 text-white text-xl font-semibold px-4 text-center">
        Select an episode below and enjoy watching!
      </div>
      <iframe id="videoPlayer" class="w-full h-full hidden relative z-10" src="" frameborder="0" allowfullscreen></iframe>
    </div>

    <div id="sourceButtons" class="flex flex-wrap gap-2 my-4 hidden"></div>

    <div class="flex items-center gap-2">
      <select id="episodeSelect" class="text-black px-3 py-1 rounded">
        <option value="">Select Episode</option>
      </select>
      <button id="playButton" class="bg-gray-400 text-white px-4 py-1 rounded cursor-not-allowed" disabled>Play</button>
    </div>
  </main>
</body>
</html>

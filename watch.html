<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Episode - AnimeNeek</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: {
          colors: {
            primary: '#1e293b',
            secondary: '#334155'
          }
        }
      }
    };
  </script>
  <script defer src="watch.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-7xl mx-auto px-4 py-6 grid grid-cols-1 md:grid-cols-4 gap-6">
    <!-- Left column: Episode list -->
    <aside class="md:col-span-1 space-y-2">
      <h2 class="text-lg font-semibold">Episodes</h2>
      <div id="episodeList" class="space-y-1 max-h-[75vh] overflow-y-auto pr-2"></div>
    </aside>

    <!-- Right column: Video player and details -->
    <section class="md:col-span-3">
      <h1 id="animeTitle" class="text-2xl font-semibold mb-4">Watch Episode</h1>

      <div class="aspect-video rounded-lg overflow-hidden shadow mb-4">
        <iframe id="videoPlayer" class="w-full h-full" src="" frameborder="0" allowfullscreen></iframe>
      </div>

      <div id="sourceButtons" class="flex gap-2 mb-4"></div>

      <div class="text-sm text-gray-500 dark:text-gray-400">
        <p id="episodeInfo">Loading episode info...</p>
      </div>
    </section>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Watch Anime</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white">

  <!-- Navigation -->
  <div id="nav-placeholder"></div>

  <!-- Main Content -->
  <div class="max-w-4xl mx-auto px-4 py-8">
    <!-- Title -->
    <h1 id="animeTitle" class="text-3xl font-bold text-center mb-6"></h1>

    <!-- Poster with Blur and Overlay -->
    <div id="posterOverlay" class="relative rounded overflow-hidden mb-6">
      <img id="posterImage" class="w-full object-cover blur-sm h-64 sm:h-96" alt="Anime Poster">
      <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center text-white text-xl font-semibold">
        Select an episode below and enjoy watching!
      </div>
    </div>

    <!-- Video Player (Hidden Initially) -->
    <iframe id="videoPlayer" class="w-full aspect-video rounded hidden mb-6" allowfullscreen loading="lazy"></iframe>

    <!-- Source Buttons -->
    <div id="sourceButtons" class="flex flex-wrap justify-center gap-3 mb-6"></div>

    <!-- Episode Selector -->
    <div class="flex flex-col sm:flex-row items-center justify-center gap-4">
      <select id="episodeSelect" class="border px-4 py-2 rounded text-black dark:text-white dark:bg-gray-800">
        <option value="">Select Episode</option>
      </select>
      <button id="playButton" disabled class="px-4 py-2 rounded bg-blue-500 text-white font-semibold disabled:opacity-50">
        Play
      </button>
    </div>
  </div>

  <script src="watch.js"></script>
</body>
</html>

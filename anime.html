<!-- anime.html -->
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Details - AnimeNeek</title>
  <link rel="icon" href="assets/favicon-image.png" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        fontFamily: { sans: ['Poppins', 'sans-serif'] },
        extend: { colors: { primary: '#1e293b' } }
      }
    };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="bg-white dark:bg-gray-900 text-gray-900 dark:text-white font-sans transition-colors duration-300">
  <div id="nav-placeholder"></div>

  <main class="max-w-5xl mx-auto p-4">
    <div id="animeDetails" class="grid md:grid-cols-3 gap-6"></div>
    <div class="mt-8">
      <h2 class="text-xl font-semibold mb-2">Related Anime</h2>
      <div id="relatedAnime" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>
  </main>
  
  <!-- Inject nav.html and then load anime.js -->
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Dynamically load nav.html
      fetch('nav.html')
        .then(response => response.text())
        .then(navData => {
          document.getElementById('nav-placeholder').innerHTML = navData;
          
          // Now load anime.js after the nav is loaded
          const script = document.createElement('script');
          script.src = 'anime.js';
          script.defer = true;
          document.body.appendChild(script);
        });
    });
  </script>
</body>
</html>
